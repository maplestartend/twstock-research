[pytest]
testpaths = tests
markers =
    needs_prod_db: integration tests that require the real data/stock.db. Run locally
        with the full DB present (509 collected -> 507 passed + 2 skipped); deselected in
        CI via `-m "not needs_prod_db"` (449 run) because data/stock.db (~3.2 GB) is not in git.
